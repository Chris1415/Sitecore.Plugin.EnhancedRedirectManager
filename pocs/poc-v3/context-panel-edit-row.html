<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit mapping row — Site Atlas v3</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="poc-bar">
      <div>
        <a href="index.html">&larr; Hub</a> · Context Panel — inline edit (one
        row)
      </div>
      <div class="right">
        <button
          class="btn btn-outline btn-sm"
          data-theme-toggle
          aria-label="Switch to dark theme"
          type="button"
        >
          Toggle theme
        </button>
      </div>
    </header>

    <main class="frame-context" role="main" aria-label="Pages context panel">
      <div class="frame-context-content">
        <div class="alert alert-warning" role="status">
          <svg
            class="alert-icon"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M12 9v4" />
            <path
              d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"
            />
            <path d="M12 17h.01" />
          </svg>
          <div class="alert-body">
            <div class="alert-title">Direct-string matches only</div>
          </div>
        </div>

        <div>
          <span class="context-heading-label">Redirects affecting</span>
          <span class="context-heading-path">/products/launch-2026</span>
        </div>

        <article class="group-card">
          <header class="group-card-header">
            <span class="group-card-name">Marketing Campaigns 2026</span>
            <span class="badge badge-bold-primary">301</span>
            <div class="group-card-flags">
              <span class="badge badge-ghost">Q-string preserved</span>
            </div>
          </header>

          <!-- Inline edit form replaces the row -->
          <div
            style="
              padding: 0.625rem;
              border: 1px solid hsl(var(--primary) / 0.4);
              border-radius: var(--radius);
              background: hsl(var(--primary) / 0.04);
              border-left-width: 4px;
            "
          >
            <div class="field" style="margin-bottom: 0.5rem">
              <label class="label text-xs" for="edit-src">Source</label>
              <input
                id="edit-src"
                class="input is-mono"
                value="/products/launch-2026"
              />
            </div>
            <div class="field" style="margin-bottom: 0.625rem">
              <label class="label text-xs" for="edit-tgt">Target</label>
              <input id="edit-tgt" class="input is-mono" value="/launch" />
            </div>
            <div class="row" style="justify-content: flex-end; gap: 0.375rem">
              <a href="context-panel.html" class="btn btn-ghost btn-sm"
                >Cancel</a
              >
              <a href="context-panel.html" class="btn btn-primary btn-sm"
                >Save</a
              >
            </div>
          </div>

          <!-- Other (non-edited) row, dimmed -->
          <div class="mapping-row" style="opacity: 0.6">
            <div>
              <div class="arrow-row">
                <span class="url url-source">/legacy/launch-page</span>
                <span class="arrow" aria-hidden="true">
                  <svg
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.25"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                  </svg>
                </span>
                <span class="url url-target url-emphasis"
                  >/products/launch-2026</span
                >
              </div>
            </div>
          </div>
        </article>
      </div>
    </main>
  </body>
</html>
