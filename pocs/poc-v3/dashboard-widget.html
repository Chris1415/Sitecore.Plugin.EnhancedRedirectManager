<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard widget — populated — Site Atlas v3</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="poc-bar">
      <div>
        <a href="index.html">&larr; Hub</a> · Dashboard widget — populated
      </div>
      <div class="right">
        <span class="muted">~600px wide</span>
        <button
          class="btn btn-outline btn-sm"
          data-theme-toggle
          aria-label="Switch to dark theme"
          type="button"
        >
          Toggle theme
        </button>
      </div>
    </header>

    <main role="main">
      <section
        class="frame-dashboard"
        aria-label="Redirect Manager dashboard widget for MarketingHub"
      >
        <header class="dashboard-header">
          <div>
            <div class="dashboard-title">
              Redirects · <strong>MarketingHub</strong>
            </div>
            <span class="sr-only">
              Three Redirect Maps in this site, totalling forty-seven mappings,
              last updated two hours ago.
            </span>
          </div>

          <div class="row" style="gap: 0.25rem">
            <!-- Decorative node-and-edge mini-graphic -->
            <svg
              class="dashboard-graphic"
              viewBox="0 0 64 40"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <line
                x1="10"
                y1="20"
                x2="32"
                y2="10"
                stroke-width="1.25"
                opacity="0.5"
              />
              <line
                x1="32"
                y1="10"
                x2="54"
                y2="28"
                stroke-width="1.25"
                opacity="0.5"
              />
              <line
                x1="10"
                y1="20"
                x2="54"
                y2="28"
                stroke-width="1.25"
                opacity="0.3"
              />
              <circle cx="10" cy="20" r="3" fill="currentColor" />
              <circle cx="32" cy="10" r="3" fill="currentColor" />
              <circle cx="54" cy="28" r="3" fill="currentColor" />
            </svg>

            <button
              class="btn btn-icon btn-ghost"
              aria-label="Widget options"
              title="Open in Redirect Manager"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="12" cy="12" r="1" />
                <circle cx="19" cy="12" r="1" />
                <circle cx="5" cy="12" r="1" />
              </svg>
            </button>
          </div>
        </header>

        <div class="tile-grid">
          <a href="full-page.html" class="stat-tile">
            <span class="stat-tile-value">3</span>
            <span class="stat-tile-label">Redirect Maps</span>
          </a>
          <a href="full-page.html" class="stat-tile">
            <span class="stat-tile-value">47</span>
            <span class="stat-tile-label">Mappings</span>
          </a>
          <a href="full-page.html" class="stat-tile">
            <span class="stat-tile-value">2h ago</span>
            <span class="stat-tile-label">Last updated</span>
          </a>
        </div>

        <div class="dashboard-footnote">
          Redirect counts only — usage analytics ship in a follow-on release.
        </div>
      </section>
    </main>
  </body>
</html>
