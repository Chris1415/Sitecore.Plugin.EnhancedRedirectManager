<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context Panel — empty — Site Atlas v3</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="poc-bar">
      <div>
        <a href="index.html">&larr; Hub</a> · Context Panel — empty state
      </div>
      <div class="right">
        <button
          class="btn btn-outline btn-sm"
          data-theme-toggle
          aria-label="Switch to dark theme"
          type="button"
        >
          Toggle theme
        </button>
      </div>
    </header>

    <main class="frame-context" role="main" aria-label="Pages context panel">
      <div class="frame-context-content">
        <div class="alert alert-warning" role="status">
          <svg
            class="alert-icon"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M12 9v4" />
            <path
              d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"
            />
            <path d="M12 17h.01" />
          </svg>
          <div class="alert-body">
            <div class="alert-title">Direct-string matches only</div>
            <div>Regex pattern matches are not yet covered.</div>
          </div>
        </div>

        <div>
          <span class="context-heading-label">Redirects affecting</span>
          <span class="context-heading-path">/products/launch-2026</span>
        </div>

        <div class="empty-state">
          <!-- Atlas-frame-with-no-nodes illustration: tokens-only, decorative -->
          <svg
            class="empty-svg"
            viewBox="0 0 96 72"
            fill="none"
            stroke="currentColor"
            stroke-width="1.25"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect
              x="6"
              y="10"
              width="84"
              height="52"
              rx="4"
              stroke-dasharray="3 3"
            />
            <circle cx="48" cy="36" r="6" stroke-dasharray="2 2" />
            <line x1="48" y1="36" x2="48" y2="36" />
            <path d="M22 22h6" stroke-dasharray="2 2" opacity="0.5" />
            <path d="M68 50h6" stroke-dasharray="2 2" opacity="0.5" />
          </svg>
          <div class="empty-heading">No redirects affect this page</div>
          <div class="empty-body">
            Add one if this page should redirect somewhere — or be the target of
            one.
          </div>
          <a
            href="context-panel-add-modal.html"
            class="btn btn-primary"
            style="margin-top: 0.5rem"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M5 12h14" />
              <path d="M12 5v14" />
            </svg>
            Add redirect for this page
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
