<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard widget — empty — Site Atlas v3</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="poc-bar">
      <div>
        <a href="index.html">&larr; Hub</a> · Dashboard widget — empty (zero
        maps)
      </div>
      <div class="right">
        <button
          class="btn btn-outline btn-sm"
          data-theme-toggle
          aria-label="Switch to dark theme"
          type="button"
        >
          Toggle theme
        </button>
      </div>
    </header>

    <main role="main">
      <section
        class="frame-dashboard"
        aria-label="Redirect Manager dashboard widget for FinanceHub"
      >
        <header class="dashboard-header">
          <div class="dashboard-title">
            Redirects · <strong>FinanceHub</strong>
          </div>
          <button
            class="btn btn-icon btn-ghost"
            aria-label="Widget options"
            title="Open in Redirect Manager"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="1" />
              <circle cx="19" cy="12" r="1" />
              <circle cx="5" cy="12" r="1" />
            </svg>
          </button>
        </header>

        <div class="empty-state">
          <svg
            class="empty-svg"
            viewBox="0 0 96 72"
            fill="none"
            stroke="currentColor"
            stroke-width="1.25"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect
              x="6"
              y="10"
              width="84"
              height="52"
              rx="4"
              stroke-dasharray="3 3"
            />
            <circle cx="48" cy="36" r="8" stroke-dasharray="2 3" />
          </svg>
          <div class="empty-heading">No redirects configured for this site.</div>
          <div class="empty-body">
            Open the manager to create the first Redirect Map.
          </div>
          <a
            href="full-page-no-redirects.html"
            class="btn btn-primary"
            style="margin-top: 0.5rem"
          >
            Open Redirect Manager
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
