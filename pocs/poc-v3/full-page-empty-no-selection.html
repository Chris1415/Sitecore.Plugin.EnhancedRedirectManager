<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full Page — first load — Site Atlas v3</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="poc-bar">
      <div>
        <a href="index.html">&larr; Hub</a> · Full Page — first load (nothing
        selected)
      </div>
      <div class="right">
        <button
          class="btn btn-outline btn-sm"
          data-theme-toggle
          aria-label="Switch to dark theme"
          type="button"
        >
          Toggle theme
        </button>
      </div>
    </header>

    <div class="frame-fullpage" role="main">
      <div class="fullpage-topbar">
        <span class="app-name">Redirect Manager</span>
        <div class="fullpage-actions">
          <button class="btn btn-ghost btn-sm" aria-disabled="true">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <span class="label-extra">Import</span>
          </button>
          <button class="btn btn-ghost btn-sm" aria-disabled="true">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span class="label-extra">Export</span>
          </button>
          <button class="btn btn-primary btn-sm" aria-disabled="true">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M5 12h14" />
              <path d="M12 5v14" />
            </svg>
            New Redirect Map
          </button>
        </div>
      </div>

      <div class="fullpage-main">
        <aside class="fullpage-picker">
          <div class="picker-section">
            <label class="label" for="picker-collection">Site collection</label>
            <select id="picker-collection" class="input">
              <option value="" selected>Pick a collection…</option>
              <option>Brand Sites</option>
              <option>Acquisition Brands</option>
            </select>
          </div>
          <div class="picker-section">
            <label class="label" for="picker-site">Site</label>
            <select id="picker-site" class="input" disabled>
              <option>Pick a collection first</option>
            </select>
          </div>
        </aside>

        <section class="fullpage-content">
          <div class="empty-state">
            <svg
              class="empty-svg"
              viewBox="0 0 96 72"
              fill="none"
              stroke="currentColor"
              stroke-width="1.25"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <rect
                x="6"
                y="10"
                width="84"
                height="52"
                rx="4"
                stroke-dasharray="3 3"
              />
              <circle cx="20" cy="28" r="3" stroke-dasharray="2 2" />
              <circle cx="48" cy="40" r="3" stroke-dasharray="2 2" />
              <circle cx="76" cy="22" r="3" stroke-dasharray="2 2" />
              <line
                x1="20"
                y1="28"
                x2="48"
                y2="40"
                stroke-dasharray="2 3"
                opacity="0.4"
              />
              <line
                x1="48"
                y1="40"
                x2="76"
                y2="22"
                stroke-dasharray="2 3"
                opacity="0.4"
              />
            </svg>
            <div class="empty-heading">Pick a collection to begin</div>
            <div class="empty-body">
              Pick a site collection on the left, then a site, to see its
              redirects.
            </div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
