<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Map detail — populated · Operator Console v1 (PRD-001)</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="surfaces.css" />
    <link rel="stylesheet" href="multilingual.css" />
    <script src="theme-toggle.js" defer></script>
  </head>
  <body>
    <div class="fp-shell">
      <header class="fp-topbar">
        <nav class="blok-breadcrumb" aria-label="breadcrumb">
          <a class="blok-breadcrumb__item" href="index.html">SneakerCo</a>
          <span class="blok-breadcrumb__sep">/</span>
          <a class="blok-breadcrumb__item" href="index.html">MainSite</a>
          <span class="blok-breadcrumb__sep">/</span>
          <span class="blok-breadcrumb__item blok-breadcrumb__item--current">Marketing campaigns</span>
        </nav>

        <div class="fp-topbar__centre">
          <div class="lp-picker">
            <a class="lp-trigger" href="full-page-de.html" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-label="Language. Currently English.">
              <span class="lp-trigger__chip">EN</span>
              <span class="lp-trigger__name">English</span>
              <span class="lp-trigger__caret glyph" data-icon="chevron-down" data-size="14"></span>
            </a>
          </div>
        </div>

        <div class="fp-topbar__actions">
          <a class="blok-btn blok-btn--ghost" href="index.html">
            <span class="glyph" data-icon="chevron-right" data-size="14" style="transform:rotate(180deg);"></span>
            Back to list
          </a>
        </div>
      </header>

      <main class="fp-pane" aria-label="Redirect map detail" style="background:var(--background);">
        <div class="fp-pane__inner">
          <section class="fp-section">
            <div class="mv-detail-hd">
              <span class="mv-detail-hd__lang-chip">EN</span>
              <h2 class="mv-detail-hd__title">Marketing campaigns</h2>
              <button class="mv-detail-hd__pencil mv-detail-hd__pencil--always" aria-label="Edit display name for English">
                <span class="glyph" data-icon="pencil" data-size="14"></span>
              </button>
              <span class="mv-detail-hd__meta">
                <span class="guid-badge" title="Click to copy GUID">
                  <span class="glyph" data-icon="copy" data-size="11"></span>
                  78D48C836DE
                </span>
              </span>
            </div>

            <header class="fp-section__hd" style="margin-top:0.5rem;">
              <span class="fp-section__lbl">Map attributes</span>
              <span class="fp-section__sub">3 language versions: en, de, fr</span>
            </header>

            <div class="fp-form-grid">
              <div class="fp-field">
                <label class="blok-label blok-label--required">Type</label>
                <select class="blok-select">
                  <option selected>301 — Permanent</option>
                  <option>302 — Found</option>
                  <option>307 — Temporary</option>
                  <option>Server Transfer</option>
                </select>
              </div>
              <div class="fp-field">
                <label class="blok-label" style="margin-bottom:0.5rem;">Flags (shared across languages)</label>
                <div class="fp-flags">
                  <label class="blok-checkbox"><input type="checkbox" checked /> Preserve query string</label>
                  <label class="blok-checkbox"><input type="checkbox" /> Preserve language</label>
                </div>
              </div>
            </div>
          </section>

          <hr class="blok-separator" />

          <section class="fp-section">
            <header class="fp-section__hd">
              <span class="fp-section__lbl">Mappings — EN</span>
              <span class="fp-section__sub">12 rows · drag to reorder</span>
            </header>

            <div class="fp-mappings">
              <div class="fp-mappings__hd">
                <span></span><span>Source</span><span></span><span>Target</span><span style="text-align:right;">Actions</span>
              </div>
              <div class="fp-mapping-row">
                <span class="fp-mapping-row__handle"><span class="glyph" data-icon="grip-vertical" data-size="14"></span></span>
                <input class="blok-input blok-input--mono" type="text" value="/products" />
                <span class="fp-mapping-row__arrow">→</span>
                <input class="blok-input blok-input--mono" type="text" value="/products-archive" />
                <div class="fp-mapping-row__actions">
                  <button class="blok-btn blok-btn--ghost blok-btn--icon" aria-label="Delete row">
                    <span class="glyph" data-icon="trash" data-size="14"></span>
                  </button>
                </div>
              </div>
              <div class="fp-mapping-row">
                <span class="fp-mapping-row__handle"><span class="glyph" data-icon="grip-vertical" data-size="14"></span></span>
                <input class="blok-input blok-input--mono" type="text" value="/products/sneakers/air-max-90" />
                <span class="fp-mapping-row__arrow">→</span>
                <input class="blok-input blok-input--mono" type="text" value="/campaigns/summer-2026/sneakers" />
                <div class="fp-mapping-row__actions">
                  <button class="blok-btn blok-btn--ghost blok-btn--icon" aria-label="Delete row">
                    <span class="glyph" data-icon="trash" data-size="14"></span>
                  </button>
                </div>
              </div>
              <div class="fp-mapping-row">
                <span class="fp-mapping-row__handle"><span class="glyph" data-icon="grip-vertical" data-size="14"></span></span>
                <input class="blok-input blok-input--mono" type="text" value="/legacy/airmax" />
                <span class="fp-mapping-row__arrow">→</span>
                <input class="blok-input blok-input--mono" type="text" value="/products/sneakers/air-max-90" />
                <div class="fp-mapping-row__actions">
                  <button class="blok-btn blok-btn--ghost blok-btn--icon" aria-label="Delete row">
                    <span class="glyph" data-icon="trash" data-size="14"></span>
                  </button>
                </div>
              </div>
              <div class="fp-mappings__add">
                <button class="blok-btn blok-btn--ghost" style="width:100%; justify-content:flex-start;">
                  <span class="glyph" data-icon="plus" data-size="14"></span>
                  Add mapping
                </button>
              </div>
            </div>
          </section>

          <div class="fp-bottom">
            <a class="blok-btn blok-btn--destructive-outline" href="delete-modal-multi.html">
              <span class="glyph" data-icon="trash" data-size="14"></span>
              Delete map
            </a>
            <div class="fp-bottom__actions">
              <button class="blok-btn blok-btn--ghost">Cancel</button>
              <button class="blok-btn blok-btn--primary">
                <span class="glyph" data-icon="save" data-size="14"></span>
                Save changes
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <p style="text-align:center; padding:0.75rem 1rem 1.5rem; font-size:var(--text-xs); color:var(--muted-foreground); border-top:1px solid var(--border);">
      <a href="index.html">← Back to list</a> · <a href="click-targets.md">click-targets.md</a>
    </p>

    <script src="icons.js"></script>
  </body>
</html>
