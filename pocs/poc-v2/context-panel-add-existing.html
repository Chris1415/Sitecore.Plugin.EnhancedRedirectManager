<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Context Panel — Add to existing map · Editor's Studio</title>
<link rel="stylesheet" href="theme.css" />
</head>
<body>

<nav style="padding: 0.5rem 1rem; border-bottom: 1px solid hsl(var(--border)); display: flex; gap: 1rem; align-items: center; font-size: 0.8125rem;">
  <a href="index.html" style="color: hsl(var(--muted-foreground)); text-decoration: none;">&larr; All screens</a>
  <span style="color: hsl(var(--muted-foreground));">·</span>
  <span class="font-medium">Context Panel — Add to existing map (inline form)</span>
</nav>

<div style="background-color: hsl(var(--background)); min-height: calc(100vh - 40px); padding: 2rem 1rem; display: flex; align-items: flex-start; justify-content: center;">

  <div class="frame frame-context-panel" style="padding: 1rem; opacity: 0.35; filter: blur(0.5px); pointer-events: none;">
    <header style="margin-bottom: 1rem;">
      <h1 style="font-size: 1rem; font-weight: 600; margin: 0;">Redirects on this page</h1>
    </header>
    <div class="alert alert-warning" role="note">
      <span class="icon icon-md"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></span>
      <div>
        <h3 class="alert-title">Heads up</h3>
        <p class="alert-body">Direct-string matches only.</p>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" style="position: static; margin-left: -360px; padding: 0; background: transparent; backdrop-filter: none;">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="add-form-title" style="max-width: 380px;">

      <div class="modal-header" style="display: flex; align-items: center; gap: 0.625rem;">
        <a href="context-panel-add-modal.html" class="btn btn-ghost btn-icon btn-sm" aria-label="Back to map list" style="min-height: 1.75rem; width: 1.75rem; height: 1.75rem;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <div style="flex: 1;">
          <h2 id="add-form-title">Add to <span style="font-weight: 500;">Spring Launch Map</span></h2>
          <p>Type 301 · Preserve QS — inherited from this map.</p>
        </div>
      </div>

      <div class="modal-body">

        <div style="margin-bottom: 1rem;">
          <label class="label" for="src-1">Source URL</label>
          <input class="input" id="src-1" value="/spring-campaign" readonly style="background-color: hsl(var(--muted)); color: hsl(var(--muted-foreground)); font-family: 'Geist Mono', monospace;" aria-describedby="src-1-help" />
          <p style="margin: 0.375rem 0 0; font-size: 0.75rem; color: hsl(var(--muted-foreground));" id="src-1-help">Pre-filled with the current page path.</p>
        </div>

        <div>
          <label class="label" for="tgt-1">Target URL</label>
          <input class="input" id="tgt-1" placeholder="/spring-2026" autofocus style="font-family: 'Geist Mono', monospace;" />
        </div>

      </div>

      <div class="modal-footer">
        <a href="context-panel-add-modal.html" class="btn btn-outline">Cancel</a>
        <a href="context-panel.html" class="btn btn-primary">Add mapping</a>
      </div>

    </div>
  </div>

</div>

</body>
</html>
