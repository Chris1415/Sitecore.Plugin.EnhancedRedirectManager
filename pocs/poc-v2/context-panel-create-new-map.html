<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Context Panel — Create new map · Editor's Studio</title>
<link rel="stylesheet" href="theme.css" />
</head>
<body>

<nav style="padding: 0.5rem 1rem; border-bottom: 1px solid hsl(var(--border)); display: flex; gap: 1rem; align-items: center; font-size: 0.8125rem;">
  <a href="index.html" style="color: hsl(var(--muted-foreground)); text-decoration: none;">&larr; All screens</a>
  <span style="color: hsl(var(--muted-foreground));">·</span>
  <span class="font-medium">Context Panel — Create new map (inline form)</span>
</nav>

<div style="background-color: hsl(var(--background)); min-height: calc(100vh - 40px); padding: 2rem 1rem; display: flex; align-items: flex-start; justify-content: center;">

  <div class="frame frame-context-panel" style="padding: 1rem; opacity: 0.35; filter: blur(0.5px); pointer-events: none;">
    <header style="margin-bottom: 1rem;">
      <h1 style="font-size: 1rem; font-weight: 600; margin: 0;">Redirects on this page</h1>
    </header>
  </div>

  <div class="modal-backdrop" style="position: static; margin-left: -360px; padding: 0; background: transparent; backdrop-filter: none;">
    <div class="modal modal-lg" role="dialog" aria-modal="true" aria-labelledby="create-form-title" style="max-width: 420px;">

      <div class="modal-header" style="display: flex; align-items: center; gap: 0.625rem;">
        <a href="context-panel-add-modal.html" class="btn btn-ghost btn-icon btn-sm" aria-label="Back to map list" style="min-height: 1.75rem; width: 1.75rem; height: 1.75rem;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <div style="flex: 1;">
          <h2 id="create-form-title">New Redirect Map</h2>
          <p>Add this redirect inside a brand-new map.</p>
        </div>
      </div>

      <div class="modal-body" style="display: flex; flex-direction: column; gap: 1.125rem;">

        <div>
          <label class="label" for="map-name">Map name</label>
          <input class="input" id="map-name" placeholder="e.g. Spring Campaign Redirects" autofocus />
        </div>

        <div>
          <label class="label" for="map-type">Redirect type</label>
          <select class="input" id="map-type" style="appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2216%22 height=%2216%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23667085%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><path d=%22m6 9 6 6 6-6%22/></svg>'); background-repeat: no-repeat; background-position: right 0.625rem center; padding-right: 2rem;">
            <option value="" selected>Choose a redirect type</option>
            <option value="301">301 — Permanent</option>
            <option value="302">302 — Temporary</option>
            <option value="307">307 — Temporary (preserve method)</option>
            <option value="ServerTransfer">ServerTransfer</option>
          </select>
          <p style="margin: 0.375rem 0 0; font-size: 0.75rem; color: hsl(var(--muted-foreground));">Required — pick before saving.</p>
        </div>

        <div>
          <span class="label" style="display: block; margin-bottom: 0.625rem;">Behavior</span>
          <div style="display: flex; flex-direction: column; gap: 0.625rem;">
            <label style="display: flex; align-items: center; gap: 0.625rem; cursor: pointer;">
              <span class="switch" role="switch" aria-checked="false"></span>
              <span style="font-size: 0.8125rem;">Preserve query string</span>
            </label>
            <label style="display: flex; align-items: center; gap: 0.625rem; cursor: pointer;">
              <span class="switch" role="switch" aria-checked="false"></span>
              <span style="font-size: 0.8125rem;">Preserve language</span>
            </label>
            <label style="display: flex; align-items: center; gap: 0.625rem; cursor: pointer;">
              <span class="switch on" role="switch" aria-checked="true"></span>
              <span style="font-size: 0.8125rem;">Include virtual folder</span>
            </label>
          </div>
        </div>

        <hr class="hairline" />

        <div>
          <span class="label" style="display: block; margin-bottom: 0.625rem;">First mapping</span>
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <input class="input" value="/spring-campaign" readonly style="background-color: hsl(var(--muted)); color: hsl(var(--muted-foreground)); font-family: 'Geist Mono', monospace;" aria-label="Source URL" />
            <div style="display: flex; align-items: center; justify-content: center; color: hsl(var(--muted-foreground));" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
            </div>
            <input class="input" placeholder="/spring-2026" style="font-family: 'Geist Mono', monospace;" aria-label="Target URL" />
          </div>
          <p style="margin: 0.375rem 0 0; font-size: 0.75rem; color: hsl(var(--muted-foreground));">Source pre-filled with the current page path.</p>
        </div>

      </div>

      <div class="modal-footer">
        <a href="context-panel-add-modal.html" class="btn btn-outline">Cancel</a>
        <button class="btn btn-primary" disabled aria-disabled="true" title="Choose a redirect type and fill the target.">Create map</button>
      </div>

    </div>
  </div>

</div>

</body>
</html>
