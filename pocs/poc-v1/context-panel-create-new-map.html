<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Context Panel — create new map · Operator Console (v1)</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="surfaces.css" />
    <script src="theme-toggle.js" defer></script>
  </head>
  <body>
    <div class="cp-frame-shell">
      <aside class="cp-frame" aria-label="Create a new redirect map">
        <div class="cp-frame__head">
          <span>Pages · Context panel</span>
          <span class="cp-frame__head__chip">/context-panel</span>
        </div>

        <div style="position:relative; flex:1; min-height:0;">
          <div class="cp-body" style="filter: blur(2px); opacity: 0.4; pointer-events: none;">
            <div class="blok-alert" role="note">
              <span class="blok-alert__icon glyph" data-icon="info" data-size="14"></span>
              <div class="blok-alert__body">Direct-string matches only — regex pattern matches are not yet covered.</div>
            </div>
            <div class="cp-callout">
              <span class="cp-callout__icon glyph" data-icon="map-pin" data-size="14"></span>
              <span>On</span>
              <span class="cp-callout__url">/products/sneakers/air-max-90</span>
            </div>
          </div>

          <div style="position:absolute; inset:0; display:flex; align-items:flex-start; justify-content:center; padding:0.75rem; background:rgba(0,0,0,0.45); overflow-y:auto;">
            <div class="blok-dialog" style="max-width:100%; width:100%;">
              <div class="blok-dialog__header">
                <h2 class="blok-dialog__title">Create new Redirect Map</h2>
                <p class="blok-dialog__sub">For <span class="mono" style="color:var(--foreground); font-size:var(--text-xs);">/products/sneakers/air-max-90</span></p>
              </div>
              <div class="blok-dialog__body">
                <div style="display:flex; flex-direction:column; gap:0.75rem;">
                  <div>
                    <label class="blok-label blok-label--required">Map name</label>
                    <input class="blok-input" type="text" placeholder="e.g. Spring 2026 launch" />
                  </div>
                  <div>
                    <label class="blok-label blok-label--required">Type</label>
                    <select class="blok-select" defaultValue="">
                      <option value="" disabled selected>Pick a type…</option>
                      <option value="301">301 — Permanent</option>
                      <option value="302">302 — Found</option>
                      <option value="307">307 — Temporary</option>
                      <option value="ServerTransfer">Server Transfer</option>
                    </select>
                    <p class="blok-helper">Required — pick before saving.</p>
                  </div>
                  <div style="display:flex; flex-direction:column; gap:0.375rem;">
                    <span class="blok-label" style="margin-bottom:0;">Flags</span>
                    <label class="blok-checkbox"><input type="checkbox" /> Preserve query string</label>
                    <label class="blok-checkbox"><input type="checkbox" /> Preserve language</label>
                    <label class="blok-checkbox"><input type="checkbox" /> Include virtual folder</label>
                  </div>
                  <hr class="blok-separator" />
                  <div style="display:flex; flex-direction:column; gap:0.5rem;">
                    <span class="blok-label" style="margin-bottom:0;">First mapping</span>
                    <div>
                      <label class="blok-label">Source</label>
                      <input class="blok-input blok-input--mono" type="text" value="/products/sneakers/air-max-90" readonly style="background:var(--muted); color:var(--muted-foreground);" />
                    </div>
                    <div>
                      <label class="blok-label blok-label--required">Target</label>
                      <input class="blok-input blok-input--mono" type="text" placeholder="/campaigns/spring-2026/sneakers" />
                    </div>
                  </div>
                </div>
              </div>
              <div class="blok-dialog__footer">
                <a class="blok-btn blok-btn--ghost" href="context-panel-add-modal.html">Back</a>
                <button class="blok-btn blok-btn--primary">
                  <span class="glyph" data-icon="plus" data-size="14"></span>
                  Create map
                </button>
              </div>
            </div>
          </div>
        </div>
      </aside>
    </div>

    <p style="text-align:center; padding:0 1rem 1.5rem; font-size:var(--text-xs); color:var(--muted-foreground);">
      <a href="index.html">← Back to all surfaces</a>
    </p>

    <script src="icons.js"></script>
  </body>
</html>
