<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Full Page — no redirect maps · Operator Console (v1)</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="surfaces.css" />
    <script src="theme-toggle.js" defer></script>
  </head>
  <body>
    <div class="fp-shell">
      <header class="fp-topbar">
        <nav class="blok-breadcrumb" aria-label="breadcrumb">
          <a class="blok-breadcrumb__item" href="full-page-empty-no-selection.html">SneakerCo</a>
          <span class="blok-breadcrumb__sep">/</span>
          <span class="blok-breadcrumb__item blok-breadcrumb__item--current">CampaignSite</span>
        </nav>
        <div class="fp-topbar__actions">
          <a class="blok-btn blok-btn--outline" href="full-page-import-preview.html">
            <span class="glyph" data-icon="upload" data-size="14"></span>
            Import
          </a>
          <button class="blok-btn blok-btn--outline" disabled>
            <span class="glyph" data-icon="download" data-size="14"></span>
            Export
          </button>
          <a class="blok-btn blok-btn--primary" href="full-page-create-redirect-map.html">
            <span class="glyph" data-icon="plus" data-size="14"></span>
            New map
          </a>
        </div>
      </header>

      <div class="fp-body">
        <aside class="fp-rail" aria-label="No redirect maps for this site">
          <div class="fp-rail__pickers">
            <div>
              <label class="blok-label">Collection</label>
              <select class="blok-select">
                <option>SneakerCo</option>
                <option>BootsBrand</option>
              </select>
            </div>
            <div>
              <label class="blok-label">Site</label>
              <select class="blok-select">
                <option>MainSite</option>
                <option selected>CampaignSite</option>
                <option>EUStore</option>
                <option>USStore</option>
              </select>
            </div>
          </div>
          <div class="fp-rail__list-hd">
            <span>Redirect maps</span>
            <span class="mono">0</span>
          </div>
          <div class="fp-rail__list" style="display:flex; align-items:center; justify-content:center; padding:1.5rem 1rem;">
            <div class="blok-empty" style="padding:0;">
              <span class="blok-empty__icon glyph" data-icon="route-off" data-size="20"></span>
              <p class="blok-empty__title">No redirect maps for this site yet</p>
              <p class="blok-empty__sub">Create one to start managing redirects.</p>
              <a class="blok-btn blok-btn--primary blok-btn--sm" href="full-page-create-redirect-map.html" style="margin-top:0.75rem;">
                <span class="glyph" data-icon="plus" data-size="14"></span>
                New map
              </a>
            </div>
          </div>
        </aside>

        <main class="fp-pane" aria-label="Redirect map detail (empty)">
          <div class="fp-pane__inner" style="display:flex; align-items:center; justify-content:center; min-height:60vh;">
            <div class="blok-empty">
              <span class="blok-empty__icon glyph" data-icon="inbox" data-size="22"></span>
              <p class="blok-empty__title">Pick a redirect map</p>
              <p class="blok-empty__sub">This site has no redirect maps yet. Create one with “New map” at the top.</p>
            </div>
          </div>
        </main>
      </div>
    </div>

    <p style="text-align:center; padding:0.75rem 1rem 1.5rem; font-size:var(--text-xs); color:var(--muted-foreground); border-top:1px solid var(--border);">
      <a href="index.html">← Back to all surfaces</a>
    </p>

    <script src="icons.js"></script>
  </body>
</html>
