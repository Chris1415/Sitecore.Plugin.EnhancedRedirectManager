<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard Widget — empty · Operator Console (v1)</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="surfaces.css" />
    <script src="theme-toggle.js" defer></script>
  </head>
  <body>
    <div class="dw-frame-shell">
      <section class="dw-frame" aria-label="No redirects configured for this site">
        <header class="dw-head">
          <h2 class="dw-head__title">Redirects</h2>
          <span class="dw-head__site">CampaignSite · SneakerCo</span>
        </header>

        <div class="blok-empty" style="padding: 1rem 0.5rem;">
          <span class="blok-empty__icon glyph" data-icon="route-off" data-size="22"></span>
          <p class="blok-empty__title">No redirects configured for this site</p>
          <p class="blok-empty__sub">Add some in the Redirects app to see counts here.</p>
        </div>

        <p class="dw-foot">Redirect counts only — usage analytics ship in a follow-on release.</p>
      </section>
    </div>

    <p style="text-align:center; padding:0 1rem 1.5rem; font-size:var(--text-xs); color:var(--muted-foreground);">
      <a href="index.html">← Back to all surfaces</a>
    </p>

    <script src="icons.js"></script>
  </body>
</html>
