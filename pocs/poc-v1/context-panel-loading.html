<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Context Panel — loading · Operator Console (v1)</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="surfaces.css" />
    <script src="theme-toggle.js" defer></script>
  </head>
  <body>
    <div class="cp-frame-shell">
      <aside class="cp-frame" aria-label="Loading redirects" aria-busy="true">
        <div class="cp-frame__head">
          <span>Pages · Context panel</span>
          <span class="cp-frame__head__chip">/context-panel</span>
        </div>

        <div class="cp-body">
          <div class="blok-alert" role="note">
            <span class="blok-alert__icon glyph" data-icon="info" data-size="14"></span>
            <div class="blok-alert__body">
              Direct-string matches only — regex pattern matches are not yet covered.
            </div>
          </div>

          <div class="cp-callout">
            <span class="cp-callout__icon glyph" data-icon="map-pin" data-size="14"></span>
            <span>On</span>
            <span class="cp-callout__url">/products/sneakers/air-max-90</span>
          </div>

          <hr class="blok-separator" />

          <div role="status" aria-live="polite" style="position:absolute; left:-9999px;">Loading redirects.</div>

          <!-- Three skeleton group blocks -->
          <section class="cp-group">
            <header class="cp-group__hd">
              <span class="blok-skeleton" style="height:14px; width:140px;"></span>
              <span class="blok-skeleton" style="height:18px; width:60px;"></span>
            </header>
            <div class="cp-row"><span class="blok-skeleton" style="height:12px; width:80%;"></span></div>
            <div class="cp-row"><span class="blok-skeleton" style="height:12px; width:65%;"></span></div>
          </section>

          <hr class="blok-separator" />

          <section class="cp-group">
            <header class="cp-group__hd">
              <span class="blok-skeleton" style="height:14px; width:120px;"></span>
              <span class="blok-skeleton" style="height:18px; width:80px;"></span>
            </header>
            <div class="cp-row"><span class="blok-skeleton" style="height:12px; width:75%;"></span></div>
            <div class="cp-row"><span class="blok-skeleton" style="height:12px; width:60%;"></span></div>
          </section>

          <hr class="blok-separator" />

          <section class="cp-group">
            <header class="cp-group__hd">
              <span class="blok-skeleton" style="height:14px; width:160px;"></span>
              <span class="blok-skeleton" style="height:18px; width:100px;"></span>
            </header>
            <div class="cp-row"><span class="blok-skeleton" style="height:12px; width:70%;"></span></div>
            <div class="cp-row"><span class="blok-skeleton" style="height:12px; width:55%;"></span></div>
          </section>
        </div>
      </aside>
    </div>

    <p style="text-align:center; padding:0 1rem 1.5rem; font-size:var(--text-xs); color:var(--muted-foreground);">
      <a href="index.html">← Back to all surfaces</a>
    </p>

    <script src="icons.js"></script>
  </body>
</html>
