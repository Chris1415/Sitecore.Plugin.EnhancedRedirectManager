<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard Widget — default · Operator Console (v1)</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="surfaces.css" />
    <script src="theme-toggle.js" defer></script>
  </head>
  <body>
    <div class="dw-frame-shell">
      <section class="dw-frame" aria-label="Redirects summary for MainSite">
        <header class="dw-head">
          <h2 class="dw-head__title">Redirects</h2>
          <span class="dw-head__site">MainSite · SneakerCo</span>
        </header>

        <div class="dw-tiles">
          <article class="dw-tile" aria-label="12 redirect maps">
            <span class="dw-tile__num">12</span>
            <span class="dw-tile__lbl">Redirect maps</span>
          </article>
          <hr class="blok-separator blok-separator--vertical" />
          <article class="dw-tile" aria-label="84 total mappings">
            <span class="dw-tile__num">84</span>
            <span class="dw-tile__lbl">Total mappings</span>
          </article>
          <hr class="blok-separator blok-separator--vertical" />
          <article class="dw-tile" aria-label="Last updated 3 days ago">
            <span class="dw-tile__txt">3 days ago</span>
            <span class="dw-tile__lbl">Last updated</span>
          </article>
        </div>

        <p class="dw-foot">Redirect counts only — usage analytics ship in a follow-on release.</p>
      </section>
    </div>

    <p style="text-align:center; padding:0 1rem 1.5rem; font-size:var(--text-xs); color:var(--muted-foreground);">
      <a href="index.html">← Back to all surfaces</a>
    </p>

    <script src="icons.js"></script>
  </body>
</html>
